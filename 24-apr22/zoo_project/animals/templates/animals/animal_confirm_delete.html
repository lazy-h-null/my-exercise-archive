{% extends 'animals/base.html' %}
{% block content %}
<h1>Delete Animal</h1>
<p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'animals:animal-list' %}">Cancel</a>
</form>
{% endblock %}
