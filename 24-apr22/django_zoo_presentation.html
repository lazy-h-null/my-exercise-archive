        --marp-vscode-highlight-color: rgb(0 0 0 / 15%);
      }

        --marp-vscode-highlight-color: rgb(255 160 0 / 70%);
      }

<h1 id="what-is-django" class="code-line" data-line="104">What is Django?</h1>
<p class="code-line" data-line="106">Django is a <strong>Python web framework</strong> that helps you build web applications quickly without reinventing the wheel.</p>
<p class="code-line" data-line="108"><strong>Django gives you out of the box:</strong></p>
<ul class="code-line" data-line="109">
<li class="code-line" data-line="109">A web server to handle requests</li>
<li class="code-line" data-line="110">A database layer (no SQL needed!)</li>
<li class="code-line" data-line="111">An admin panel</li>
<li class="code-line" data-line="112">A templating engine for HTML pages</li>
<li class="code-line" data-line="113">Form handling and validation</li>
</ul>
<blockquote class="code-line" data-line="115">
<p class="code-line" data-line="115"><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <strong>Think of it like this:</strong> Django is the blueprint + toolkit for building a house. You bring the design, it handles the foundations.</p>
</blockquote>
</section>

<h1 id="our-project--zoo-animal-manager-%F0%9F%90%98" class="code-line" data-line="119">Our Project — Zoo Animal Manager <img class="emoji" draggable="false" alt="🐘" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f418.svg" data-marp-twemoji=""/></h1>
<p class="code-line" data-line="121">We will build an app to manage animals in a zoo.</p>
<p class="code-line" data-line="123"><strong>What users can do:</strong></p>
<table class="code-line" data-line="125">
<thead class="code-line" data-line="125">
<tr class="code-line" data-line="125">
<th>Action</th>
<th>Description</th>
</tr>
</thead>
<tbody class="code-line" data-line="127">
<tr class="code-line" data-line="127">
<td><strong>Create</strong></td>
<td>Add a new animal to the zoo</td>
</tr>
<tr class="code-line" data-line="128">
<td><strong>Read</strong></td>
<td>View a list or details of any animal</td>
</tr>
<tr class="code-line" data-line="129">
<td><strong>Update</strong></td>
<td>Edit an animal's information</td>
</tr>
<tr class="code-line" data-line="130">
<td><strong>Delete</strong></td>
<td>Remove an animal from the system</td>
</tr>
<tr class="code-line" data-line="131">
<td><strong>Search</strong></td>
<td>Find animals by name, age, weight, or origin</td>
</tr>
</tbody>
</table>
<p class="code-line" data-line="133"><strong>Each animal has:</strong><br />
<code>name</code> · <code>age</code> · <code>weight</code> · <code>born_in_captivity</code></p>
</section>

<h1 id="project-setup--step-by-step" class="code-line" data-line="208">Project Setup — Step by Step</h1>
<p class="code-line" data-line="210"><strong>1 · Create a virtual environment and install Django</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-bash" data-line="212"><span class="hljs-built_in">mkdir</span> zoo_project &amp;&amp; <span class="hljs-built_in">cd</span> zoo_project
python -m venv venv
<span class="hljs-built_in">source</span> venv/bin/activate       <span class="hljs-comment"># Windows: venv\Scripts\activate</span>
pip install django
</code></pre>
<p class="code-line" data-line="219"><strong>2 · Create the project and app</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-bash" data-line="221">django-admin startproject zoo_site .
python manage.py startapp animals
</code></pre>
<p class="code-line" data-line="226"><strong>3 · Register the app in <code>zoo_site/settings.py</code></strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-python" data-line="228">INSTALLED_APPS = [
    <span class="hljs-comment"># ... Django&#x27;s built-in apps ...</span>
    <span class="hljs-string">&#x27;animals&#x27;</span>,   <span class="hljs-comment"># ← Add this line</span>
]
</code></pre>
<blockquote class="code-line" data-line="235">
<p class="code-line" data-line="235"><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4a1.svg" data-marp-twemoji=""/> An <strong>app</strong> is a self-contained module inside a Django <strong>project</strong>. One project can have many apps.</p>
</blockquote>

<h1 id="the-animal-model" class="code-line" data-line="281">The Animal Model</h1>
<p class="code-line" data-line="283">The <strong>model</strong> defines what data is stored in the database. Each field maps to a column.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-python" data-line="285"><span class="hljs-comment"># animals/models.py</span>
<span class="hljs-keyword">from</span> django.db <span class="hljs-keyword">import</span> models
<span class="hljs-keyword">from</span> django.urls <span class="hljs-keyword">import</span> reverse

<span class="hljs-keyword">class</span> <span class="hljs-title class_">Animal</span>(models.Model):
    name              = models.CharField(max_length=<span class="hljs-number">100</span>)
    age               = models.IntegerField(help_text=<span class="hljs-string">&quot;Age in years&quot;</span>)
    weight            = models.FloatField(help_text=<span class="hljs-string">&quot;Weight in kilograms&quot;</span>)
    born_in_captivity = models.BooleanField(default=<span class="hljs-literal">False</span>)

    <span class="hljs-keyword">class</span> <span class="hljs-title class_">Meta</span>:
        ordering = [<span class="hljs-string">&#x27;name&#x27;</span>]       <span class="hljs-comment"># Always sorted A→Z</span>

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__str__</span>(<span class="hljs-params">self</span>):
        <span class="hljs-keyword">return</span> <span class="hljs-string">f&quot;<span class="hljs-subst">{self.name}</span> (age <span class="hljs-subst">{self.age}</span>)&quot;</span>

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">get_absolute_url</span>(<span class="hljs-params">self</span>):
        <span class="hljs-keyword">return</span> reverse(<span class="hljs-string">&#x27;animals:animal-detail&#x27;</span>, kwargs={<span class="hljs-string">&#x27;pk&#x27;</span>: <span class="hljs-variable language_">self</span>.pk})
</code></pre>
<p class="code-line" data-line="306">Then run:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-bash" data-line="307">python manage.py makemigrations animals   <span class="hljs-comment"># creates migration file</span>
python manage.py migrate                  <span class="hljs-comment"># applies changes to the database</span>
</code></pre>
</section>

<h1 id="url-routing" class="code-line" data-line="314">URL Routing</h1>
<p class="code-line" data-line="316">URLs tell Django <strong>which view to call</strong> for each web address.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-python" data-line="318"><span class="hljs-comment"># animals/urls.py</span>
<span class="hljs-keyword">from</span> django.urls <span class="hljs-keyword">import</span> path
<span class="hljs-keyword">from</span> . <span class="hljs-keyword">import</span> views

app_name = <span class="hljs-string">&#x27;animals&#x27;</span>   <span class="hljs-comment"># namespace — avoids name collisions</span>

urlpatterns = [
    path(<span class="hljs-string">&#x27;&#x27;</span>,                         views.HomeView.as_view(),         name=<span class="hljs-string">&#x27;home&#x27;</span>),
    path(<span class="hljs-string">&#x27;animals/&#x27;</span>,                 views.AnimalListView.as_view(),   name=<span class="hljs-string">&#x27;animal-list&#x27;</span>),
    path(<span class="hljs-string">&#x27;animals/&lt;int:pk&gt;/&#x27;</span>,        views.AnimalDetailView.as_view(), name=<span class="hljs-string">&#x27;animal-detail&#x27;</span>),
    path(<span class="hljs-string">&#x27;animals/add/&#x27;</span>,             views.AnimalCreateView.as_view(), name=<span class="hljs-string">&#x27;animal-create&#x27;</span>),
    path(<span class="hljs-string">&#x27;animals/&lt;int:pk&gt;/edit/&#x27;</span>,   views.AnimalUpdateView.as_view(), name=<span class="hljs-string">&#x27;animal-update&#x27;</span>),
    path(<span class="hljs-string">&#x27;animals/&lt;int:pk&gt;/delete/&#x27;</span>, views.AnimalDeleteView.as_view(), name=<span class="hljs-string">&#x27;animal-delete&#x27;</span>),
    path(<span class="hljs-string">&#x27;animals/search/&#x27;</span>,          views.AnimalSearchView.as_view(), name=<span class="hljs-string">&#x27;animal-search&#x27;</span>),
]
</code></pre>
<blockquote class="code-line" data-line="336">
<p class="code-line" data-line="336"><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <code>&lt;int:pk&gt;</code> is a <strong>URL parameter</strong> — it captures the animal's ID from the address bar, e.g. <code>/animals/3/</code> gives <code>pk=3</code>.</p>
</blockquote>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-python" data-line="412"><span class="hljs-keyword">def</span> <span class="hljs-title function_">get_context_data</span>(<span class="hljs-params">self, **kwargs</span>):
    context = <span class="hljs-built_in">super</span>().get_context_data(**kwargs)
    context[<span class="hljs-string">&#x27;my_variable&#x27;</span>] = some_value   <span class="hljs-comment"># available in the template</span>
    <span class="hljs-keyword">return</span> context
</code></pre>

<h1 id="how-the-search-works" class="code-line" data-line="617">How the Search Works</h1>
<p class="code-line" data-line="619">The search uses <code>FormView</code> with a <strong>GET request</strong> — results are bookmarkable, no CSRF token needed.</p>
<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <marker id="c" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0f9b58" />
    </marker>
  </defs>
  
  <rect x="10" y="65" width="110" height="60" rx="10" fill="#16213e" />
  <text x="65" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="bold">User</text>
  <text x="65" y="109" text-anchor="middle" fill="#aed6f1" font-size="10">Fills in form</text>
  <text x="65" y="122" text-anchor="middle" fill="#aed6f1" font-size="10">clicks Search</text>
  
  <line x1="120" y1="95" x2="175" y2="95" stroke="#0f9b58" stroke-width="2" marker-end="url(#c)" />
  <text x="148" y="86" text-anchor="middle" fill="#555" font-size="9">GET request</text>
  
  <rect x="175" y="45" width="150" height="90" rx="10" fill="#0f3460" />
  <text x="250" y="72" text-anchor="middle" fill="#89b4fa" font-size="12" font-weight="bold">get_form_kwargs()</text>
  <text x="250" y="90" text-anchor="middle" fill="#cdd6f4" font-size="10">Binds request.GET</text>
  <text x="250" y="106" text-anchor="middle" fill="#cdd6f4" font-size="10">data to the form</text>
  <text x="250" y="122" text-anchor="middle" fill="#6c7086" font-size="10">(normally only POST)</text>
  
  <line x1="325" y1="95" x2="375" y2="95" stroke="#0f9b58" stroke-width="2" marker-end="url(#c)" />
  
  <rect x="375" y="45" width="165" height="90" rx="10" fill="#0f9b58" />
  <text x="457" y="72" text-anchor="middle" fill="white" font-size="12" font-weight="bold">get_context_data()</text>
  <text x="457" y="90" text-anchor="middle" fill="white" font-size="10">form.is_valid() → True</text>
  <text x="457" y="106" text-anchor="middle" fill="white" font-size="10">Filters queryset</text>
  <text x="457" y="122" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Adds results to context</text>
  
  <line x1="540" y1="95" x2="585" y2="95" stroke="#0f9b58" stroke-width="2" marker-end="url(#c)" />
  
  <rect x="585" y="65" width="105" height="60" rx="10" fill="#8e44ad" />
  <text x="637" y="92" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Template</text>
  <text x="637" y="109" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">Shows results</text>
  
  <rect x="80" y="160" width="540" height="28" rx="6" fill="#f0f4f8" stroke="#0f9b58" stroke-width="1.5" />
  <text x="350" y="178" text-anchor="middle" fill="#16213e" font-size="11">🔗  /animals/search/?name=lion&amp;min_age=2  ← bookmarkable!</text>
  
  <rect x="0" y="200" width="700" height="60" fill="none" />
</svg>
<p class="code-line" data-line="665"><strong>Key trick:</strong> override <code>get_form_kwargs()</code> to bind <code>request.GET</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-python" data-line="666"><span class="hljs-keyword">def</span> <span class="hljs-title function_">get_form_kwargs</span>(<span class="hljs-params">self</span>):
    kwargs = <span class="hljs-built_in">super</span>().get_form_kwargs()
    <span class="hljs-keyword">if</span> <span class="hljs-variable language_">self</span>.request.method == <span class="hljs-string">&#x27;GET&#x27;</span> <span class="hljs-keyword">and</span> <span class="hljs-variable language_">self</span>.request.GET:
        kwargs[<span class="hljs-string">&#x27;data&#x27;</span>] = <span class="hljs-variable language_">self</span>.request.GET
    <span class="hljs-keyword">return</span> kwargs
</code></pre>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-python" data-line="678"><span class="hljs-comment"># forms.py — all fields optional, any combination works</span>

<h1 id="key-concepts-recap-12" class="code-line" data-line="738">Key Concepts Recap (1/2)</h1>
<p class="code-line" data-line="740"><strong><code>get_context_data()</code></strong> — inject extra variables into any template</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-python" data-line="741">context[<span class="hljs-string">&#x27;is_elderly&#x27;</span>] = animal.age &gt; <span class="hljs-number">15</span>   <span class="hljs-comment"># use as {{ is_elderly }} in HTML</span>
</code></pre>
<p class="code-line" data-line="745"><strong><code>reverse_lazy()</code></strong> — safe URL generation in class-level attributes</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-python" data-line="746">success_url = reverse_lazy(<span class="hljs-string">&#x27;animals:animal-list&#x27;</span>)  <span class="hljs-comment"># resolves at request time</span>
</code></pre>
<p class="code-line" data-line="750"><strong><code>context_object_name</code></strong> — rename the default queryset variable</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="code-line language-python" data-line="751">context_object_name = <span class="hljs-string">&#x27;animals&#x27;</span>   <span class="hljs-comment"># template uses {{ animals }} not {{ object_list }}</span>
</code></pre>
</section>
