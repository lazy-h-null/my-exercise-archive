<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Zoo Management{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10">
    <nav class="flex justify-between items-center border-b-2 pb-4 mb-10">
        <a href="{% url 'animals:animal-list' %}" class="text-2xl font-bold">Zoo Admin</a>
        <div class="flex items-center gap-5">
            <a href="{% url 'animals:animal-list' %}">Home</a>
            {% if user.is_authenticated %}
                <a href="{% url 'animals:animal-create'%}">Add New</a>
                <a href="{% url 'animals:animal-search'%}">Search</a>
                <a href="{% url 'animals:animal-archive-index'%}">Archive</a>
                <a href="{% url 'animals:animal-today-archive'%}">Today</a>
                <a href="{% url 'password_change'%}">Change PW</a>
                <span class="font-semibold text-gray-500">User: <b>{{ user.username }}</b></span>
                <form method="post" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="border px-2 py-1 rounded hover:bg-gray-100 text-black">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-sm">Login</a>
                <a href="{% url 'animals:signup' %}" class="btn btn-sm btn-outline">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <main>
        <h1 class="text-3xl mb-5">{% block heading %}{% endblock %}</h1>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
