{% extends 'animals/base.html' %}
{% block heading %}{{ page_title }}{% endblock %}
{% block content %}
<div class="max-w-md border p-10 rounded-lg shadow-sm">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-secondary w-full mt-6 text-white">Create My Account</button>
    </form>

    <div class="mt-6 pt-4 border-t text-center">
        <p> Already have an account?
            <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
